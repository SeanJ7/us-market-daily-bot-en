name: US Market Daily Report (English)

on:
  schedule:
    - cron: "35 8 * * 2-6"
      timezone: "Australia/Melbourne"
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate and send report
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python send_latest_report.py --force
          else
            python send_latest_report.py
          fi

      - name: Detect generated report
        id: report_status
        run: |
          if [ -f reports/latest.html ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare GitHub Pages site
        if: steps.report_status.outputs.ready == 'true'
        run: |
          mkdir -p site/reports
          cp reports/latest.html site/index.html
          cp reports/*.html site/reports/
          cp reports/*.md site/reports/ || true
          touch site/.nojekyll

      - name: Configure GitHub Pages
        if: steps.report_status.outputs.ready == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.report_status.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.report_status.outputs.ready == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-market-daily-en-artifacts
          path: |
            reports/*.md
            reports/*.html
            .state/*.json
          if-no-files-found: ignore
